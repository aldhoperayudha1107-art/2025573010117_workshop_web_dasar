<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan 2</title>
    <link rel="stylesheet" href="latihan-2.css" />
  </head>
  <body>
    <h2>FAQ / Accordion</h2>
    <div class="faq">
      <details>
        <summary>Apa itu HTML?</summary>
        <p>HTML adalah bahasa markup untuk membuat struktur halaman web.</p>
      </details>

      <details>
        <summary>Apa itu CSS?</summary>
        <p>CSS digunakan untuk mengatur tampilan dan desain halaman web.</p>
      </details>

      <details>
        <summary>Apa itu JavaScript?</summary>
        <p>JavaScript digunakan untuk membuat interaksi pada website.</p>
      </details>
    </div>

    <h2>Image Hover Overlay</h2>
    <div class="gallery">
      <div
        class="img-box"
        style="background-image: url(&quot;https://picsum.photos/300?1&quot;)"
        data-title="Gambar 1"
      ></div>
      <div
        class="img-box"
        style="background-image: url(&quot;https://picsum.photos/300?2&quot;)"
        data-title="Gambar 2"
      ></div>
      <div
        class="img-box"
        style="background-image: url(&quot;https://picsum.photos/300?3&quot;)"
        data-title="Gambar 3"
      ></div>
      <div
        class="img-box"
        style="background-image: url(&quot;https://picsum.photos/300?4&quot;)"
        data-title="Gambar 4"
      ></div>
    </div>

    <h2>Progress Bar</h2>
    <div class="progress-container">
      <div class="progress" style="--progress: 75%">75%</div>
      <div class="progress" style="--progress: 50%">50%</div>
      <div class="progress" style="--progress: 90%">90%</div>
    </div>
  </body>
</html>
